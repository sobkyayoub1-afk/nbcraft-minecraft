<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>NBCraft - Minecraft Beta 1.7.3</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Play Minecraft Beta 1.7.3 in your web browser">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NBCraft">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-96x96.png">
    <link rel="shortcut icon" href="/icons/icon-96x96.png">
    <link rel="icon" href="/icons/icon-96x96.png" type="image/png">
    <style>
      html, body {
        background-color: black;
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        border: 0px none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <script type="text/javascript" src="coi-serviceworker.min.js"></script>
    <script type='text/javascript'>
      var Module = {
        print: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.log(text);
        },
        printErr: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.error(text);
        },
        canvas: (function () {
          var canvas = document.getElementById('canvas');

          // As a default initial behavior, pop up an alert when webgl context is lost. To make your
          // application robust, you may want to override this behavior before shipping!
          // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);

          // Handle Resize
          function setCanvasSize() {
            Module.ccall('resize_from_js', null, ['number', 'number'], [window.innerWidth, window.innerHeight]);
          }
          window.addEventListener("resize", setCanvasSize);

          return canvas;
        })(),
        arguments: [String(window.innerWidth), String(window.innerHeight)],
        preRun: [function () {
          const urlParams = new URLSearchParams(window.location.search);
          ENV.MCPE_INPUT_MODE = urlParams.get('inputMode');
        }]
      };
    </script>
    <script async type="text/javascript" src="nbcraft.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(registration) {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
              console.log('ServiceWorker active: ', registration.active);
              console.log('ServiceWorker installing: ', registration.installing);
              console.log('ServiceWorker waiting: ', registration.waiting);
            })
            .catch(function(err) {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      } else {
        console.log('Service Workers are not supported in this browser');
      }
    </script>
  </body>
</html>
